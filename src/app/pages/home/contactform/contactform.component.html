<p-toast></p-toast>

<section id="contactform" class="contact-form-section">
  <h2>Оставьте заявку</h2>
  <p>Оставьте контакты и кратко опишите задачу — ответим в рабочее время.</p>

  <form [formGroup]="contactForm" (ngSubmit)="submitForm()">
    <div class="form-group">
      <input
        type="text"
        pInputText
        placeholder="Ваше имя"
        formControlName="name"
      />
    </div>
    <div class="form-group">
      <input
        type="tel"
        pInputText
        placeholder="Телефон"
        formControlName="phone"
        inputmode="tel"
        [attr.pattern]="phonePattern"
      />
    </div>
    <div class="form-group">
      <textarea
        pInputTextarea
        rows="4"
        placeholder="Комментарий (необязательно)"
        formControlName="message"
      ></textarea>
    </div>

   <div class="form-group consent">
  <p-checkbox
    formControlName="consent"
    binary="true"
    inputId="consent"
  ></p-checkbox>
  <label for="consent">
    Я даю согласие на обработку моих персональных данных
    (имя, номер телефона, содержание сообщения)
    в целях обработки заявки и заключения договора
    и подтверждаю ознакомление с
    <a routerLink="/policy" target="_blank">
      Политикой обработки персональных данных
    </a>.
  </label>
</div>
    <button
      pButton
      type="submit"
      label="Отправить"
      [disabled]="!contactForm.valid"
    ></button>
  </form>
</section>
